<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AliciaIA</title>

<style>

:root {

--primary-color: #F7DC6F;

--secondary-color: #F2C464;

--text-color: #333;

--background-color: #F9F9F9;

}



body {

font-family: Arial, sans-serif;

background-color: var(--background-color);

color: var(--text-color);

margin: 0;

padding: 0;

}



.container {

max-width: 800px;

margin: 40px auto;

padding: 20px;

background-color: #fff;

border: 1px solid #ddd;

border-radius: 10px;

box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);

}



h1 {

color: var(--primary-color);

text-align: center;

}



input[type="file"], input[type="text"] {

width: 100%;

padding: 10px;

margin-bottom: 20px;

border: 1px solid #ccc;

border-radius: 5px;

}



button {

background-color: var(--primary-color);

color: #fff;

padding: 10px 20px;

border: none;

border-radius: 5px;

cursor: pointer;

}



button:hover {

background-color: var(--secondary-color);

}



textarea {

width: 100%;

height: 100px;

padding: 10px;

margin-bottom: 20px;

border: 1px solid #ccc;

border-radius: 5px;

}

</style>

</head>

<body>

<div class="container">

<h1>AliciaIA</h1>

<input type="file" id="imagen" accept="image/*">

<button id="procesar">Procesar imagen</button>

<textarea id="resultado"></textarea>

<input type="text" id="expresion">

<button id="calcular">Calcular</button>

<textarea id="resultado-calculo"></textarea>

</div>



<script type="importmap">

{

"imports": {

"tesseract": "https://cdn.jsdelivr.net/npm/tesseract.js@2.1.4/dist/tesseract.min.js",

"mathjs": "https://cdn.jsdelivr.net/npm/mathjs@11.8.0/dist/math.min.js"

}

}

</script>

<script type="module">

import 'https://cdn.jsdelivr.net/npm/tesseract.js@2.1.4/dist/tesseract.min.js';

import math from 'https://cdn.jsdelivr.net/npm/mathjs@11.8.0/dist/math.min.js';



// Módulo de procesamiento de imágenes

async function procesarImagen(imagen) {

const worker = await Tesseract.createWorker();

const { data: { text } } = await worker.recognize(imagen);

await worker.terminate();

return text;

}



// Módulo de cálculo

function calcularExpresion(expresion) {

try {

const resultado = math.evaluate(expresion);

return resultado.toString();

} catch (error) {

return 'Error en la expresión';

}

}



// Eventos

document.getElementById('procesar').addEventListener('click', async () => {

const imagen = document.getElementById('imagen').files[0];

const reader = new FileReader();

reader.onload = async () => {

const texto = await procesarImagen(reader.result);

document.getElementById('resultado').value = texto;

};

reader.readAsDataURL(imagen);

});



document.getElementById('calcular').addEventListener('click', () => {

const expresion = document.getElementById('expresion').value;

const resultado = calcularExpresion(expresion);

document.getElementById('resultado-calculo').value = resultado;

});

</script>

</body>

</html>

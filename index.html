<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dou-IA: Mi Asistente de Tareas</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #00ff88; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #bbb; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; border-radius: 6px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00ff88; border: none; color: #121212; font-weight: bold; font-size: 16px; border-radius: 6px; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        button:hover { background: #00cc6e; }
        .box { background: #2d2d2d; padding: 15px; border-radius: 6px; border-left: 4px solid #00ff88; margin-top: 15px; white-space: pre-wrap; font-family: monospace; }
        .loading { color: #ffbb00; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 Dou-IA</h1>
    <p style="text-align:center; color:#888;">Procesador de tareas e imágenes desde cero</p>
    
    <form id="ia-form">
        <label>Escribe el tema o pregunta de tu tarea:</label>
        <input type="text" id="pregunta" placeholder="Ej: Fotosíntesis, Revolución de Mayo, etc." required>
        
        <label>Sube una imagen o foto del ejercicio (Opcional):</label>
        <input type="file" id="imagen" accept="image/*">
        
        <button type="submit">Enviar a la IA</button>
    </form>

    <div id="loading" class="loading">🧠 Mi neurona está razonando y buscando en la web...</div>
    
    <div id="resultado-seccion" style="display:none;">
        <label>Respuesta de tu Servidor IA:</label>
        <div id="respuesta" class="box"></div>
    </div>
</div>

<script>
    // CAMBIA ESTA URL POR LA DE TU SERVIDOR EN RENDER:
    const URL_MI_IA = "https://dou-ia.onrender.com/procesar-tarea";

    document.getElementById('ia-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const pregunta = document.getElementById('pregunta').value;
        const imagenInput = document.getElementById('imagen').files[0];
        const loading = document.getElementById('loading');
        const resultadoSeccion = document.getElementById('resultado-seccion');
        const respuestaBox = document.getElementById('respuesta');

        loading.style.display = "block";
        resultadoSeccion.style.display = "none";

        // Preparamos los datos tal como los espera FastAPI
        const formData = new FormData();
        formData.append("pregunta", pregunta);
        if (imagenInput) {
            formData.append("archivo_imagen", imagenInput);
        }

        try {
            // Conexión mágica entre GitHub Pages y Render
            const response = await fetch(URL_MI_IA, {
                method: "POST",
                body: formData
            });

            const data = await response.json();
            
            // Estructuramos la respuesta en pantalla de forma bonita
            let textoVisible = `📝 Pregunta: ${data.pregunta_recibida}\n\n`;
            
            if(data.analisis_visual) {
                textoVisible += `👁️ ANÁLISIS VISUAL DE PÍXELES (Matrices NumPy):\n`;
                textoVisible += `   - Brillo Promedio Rojo:  ${data.analisis_visual.brillo_promedio_RGB.Rojo}\n`;
                textoVisible += `   - Brillo Promedio Verde: ${data.analisis_visual.brillo_promedio_RGB.Verde}\n`;
                textoVisible += `   - Brillo Promedio Azul:  ${data.analisis_visual.brillo_promedio_RGB.Azul}\n\n`;
            }
            
            textoVisible += `🌐 DATOS CAPTURADOS EN VIVO DE LA WEB:\n${data.informacion_encontrada_web}\n\n`;
            textoVisible += `🧠 DECISIÓN MATEMÁTICA DE LA RED NEURONAL (Pesos finales):\n[${data.decision_neuronal_pesos.join(', ')}]`;

            respuestaBox.textContent = textoVisible;
            resultadoSeccion.style.display = "block";

        } catch (error) {
            respuestaBox.textContent = "Error al conectar con la IA. Asegúrate de que el servidor en Render no esté dormido.";
            resultadoSeccion.style.display = "block";
        } finally {
            loading.style.display = "none";
        }
    });
</script>

</body>
</html>
